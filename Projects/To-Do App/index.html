<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #333;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: start;
            flex-direction: column;
            gap: 20px;
            padding-left: 30px;
            height: 500px;
            width: 500px;
            /* background-color: crimson; */
        }
        input{
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }
        button{
            padding: 10px 15px;
        }
        .result{
            width: 100%;
        }
        .result .card{
            background-color: rgb(79, 111, 139);
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 50px;
            align-items: center;
            padding: 0 20px;
            margin: 10px;
        }
        .card p{
            font-size: 1.2rem;
            font-family: sans-serif;
            color: white;
        }
        .btn{
            display: flex;
            gap: 10px;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" placeholder="add items...." value="" />
      <button class="add">Add</button>
      <div class="result">
        <!-- <div class="card">
          <p>Task 1</p>
          <div class="btn"><button>Delete</button><button>Edit</button></div>
        </div> -->
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
