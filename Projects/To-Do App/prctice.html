<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(184, 195, 195);
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: start;
            flex-direction: column;
            gap: 20px;
            width: 500px;
            height: 500px;
            padding-left: 30px;
        }
        input{
            border-radius: 3px;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>
        <input type="text" name="" id="" placeholder="ADD items...">
        <button class="add">Add</button>
        <div class="result">
            <p>Task 1</p>
            <div class="btn"><button>Delete</button><button>Edit</button></div>
        </div>
    </div>
</body>
</html>
