<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        /* overflow: hidden; */
        height: auto;
        margin: 0;
        padding: 10px;
        width: 100%;
    }
    .container{
        /* padding: 20px; */
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        background-color: crimson;
        width: 100%;
        height: auto;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
    }

    .card {
        background-color: white;
        padding: 25px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    h1 {
        text-align: center;
        color: white;
        position: absolute;
        top: 20px;
    }

    p {
        margin: 10px 0;
        font-size: 14px;
    }

    span {
        color: #333;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background-color: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #5a67d8;
    }
    </style>
</head>
<body>
    <div id="container" class="container">
        <h1>Comment Data</h1>

    </div>
    <script src="styl.js"></script>
    
</body>
</html>
