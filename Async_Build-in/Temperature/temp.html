<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background-color: rgb(159, 212, 199);
        }
        .container{
            width: 350px;
            background-color: rgb(239, 236, 232);
            padding: 20px 30px;
            border: 2px rgb(20, 10, 10);
            border-radius: 10px;
            box-shadow:0px 4px 10px rgba(0, 0, 0, 0) ;
        }
        h1{
            font-size: bold;
            text-align: center;
            color: blue;
            margin-bottom: 20px;
        }
        label{
            color: rgb(255, 6, 6);
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        input{
            width: 100%;
            height: 100%;
            border-radius: 2px;
            border: 1px solid;
            font-size: 1rem;
        }
        .note{
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #080808;
        }

    </style>
  </head>
  <body>
    <div class="container">
      <h1>Temperature Converter</h1>
      <div class="convert">
        <label for="Celsius">Celsius(°C)</label>
        <input
          type="number"
          name=""
          id="celsius"
          placeholder="Enter Celsius"
        /><br /><br />
        <label for="Fahrenheit">Fahrenheit(°F)</label>
        <input
          type="number"
          name=""
          id="fahrenheit"
          placeholder="Enter Fahrenheit"
        /><br /><br />
        <label for="Kelvin">Kelvin(k)</label>
        <input type="number" name="" id="kelvin" placeholder="Enter Kelvin" />
      </div>
      <p class="">Values update automatically when you type in any box</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
