<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    width: 150%;
    height: auto;
    display: flex;
    justify-content: center;
}

/* Card Styling */
.card {
    background-color: #ffffff;
    width: 320px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease;
}

/* Hover Effect */
.card:hover {
    transform: scale(1.05);
}

/* Heading */
.card h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #333;
}

/* Paragraphs */
.card p {
    margin: 8px 0;
    font-size: 14px;
    color: #555;
}

/* Completed Status */
.card p:last-child {
    font-weight: bold;
    color: red; /* because completed is false */
}
    </style>
</head>
<body>
    <div class = "container">
        <div class="card">
        <h2>Todo Item</h2>

        <p><strong>User ID:</strong> 1</p>
        <p><strong>ID:</strong> 1</p>
        <p><strong>Title:</strong> delectus aut autem</p>
        <p><strong>Completed:</strong> false</p>

    </div>
    <script src="Too.js"></script>

    </div>
</body>
</html>
